name: Private Package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built artifacts to the private package feed
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: private-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip

      - name: Install project with dev dependencies
        run: pip install -e .[dev]

      - name: Run focused tests
        run: python -m pytest test_projects_config.py

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-dist
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    environment: private-package-feed

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-dist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip

      - name: Install Twine
        run: python -m pip install twine

      - name: Publish to private feed
        env:
          TWINE_REPOSITORY_URL: ${{ secrets.PRIVATE_PYPI_REPOSITORY_URL }}
          TWINE_USERNAME: ${{ secrets.PRIVATE_PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PRIVATE_PYPI_PASSWORD }}
        run: python -m twine upload dist/*